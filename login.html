<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VXLINK</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#05070D;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#fff;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
    text-align:center;
}

.logo{
    width:320px;
    max-width:95%;
    margin-bottom:35px;
}

h1{
    font-size:58px;
    font-weight:700;
    margin-bottom:12px;
}

.subtitulo{
    color:#8f97a3;
    font-size:22px;
    margin-bottom:45px;
}

.input-box{
    margin-bottom:18px;
}

input{
    width:100%;
    height:68px;
    background:#091124;
    border:1px solid #101a32;
    border-radius:18px;
    padding:0 22px;
    color:#ffffff;
    font-size:20px;
    transition:0.3s;
}

input::placeholder{
    color:#7b8291;
}

input:focus{
    outline:none;
    border-color:#1E5BFF;
    box-shadow:0 0 15px rgba(30,91,255,.25);
}

button{
    width:100%;
    height:68px;
    border:none;
    border-radius:18px;
    background:#1E5BFF;
    color:#fff;
    font-size:28px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    transition:.3s;
}

button:hover{
    transform:scale(1.02);
}

.esqueci{
    margin-top:35px;
    color:#8a8f99;
    font-size:18px;
}

@media (max-width:480px){

.logo{
    width:290px;
}

h1{
    font-size:50px;
}

.subtitulo{
    font-size:18px;
}

input{
    height:62px;
    font-size:18px;
}

button{
    height:62px;
    font-size:24px;
}

}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>Bem-vindo!</h1>

<p class="subtitulo">
Acesse sua conta para continuar
</p>

<div class="input-box">
<input type="text" placeholder="E-mail ou usuário">
</div>

<div class="input-box">
<input type="password" placeholder="Senha">
</div>

<button>Entrar</button>

<p class="esqueci">
Esqueci minha senha
</p>

</div>

</body>
</html>
