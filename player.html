<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player - VXLINK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#05070D;
color:white;
}

header{
position:sticky;
top:0;
z-index:999;
background:rgba(5,7,13,.92);
backdrop-filter:blur(15px);
padding:18px;
border-bottom:1px solid rgba(255,255,255,.05);

display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
height:55px;
}

.voltar{
background:#1E5BFF;
color:white;
text-decoration:none;
padding:10px 18px;
border-radius:14px;
font-weight:bold;
}

.container{
max-width:1300px;
margin:auto;
padding:20px;
}

.player-box{
width:100%;
background:black;
border-radius:20px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,.4);
}

video{
width:100%;
display:block;
background:black;
}

.info{
margin-top:25px;
}

.info h1{
font-size:35px;
margin-bottom:10px;
}

.info p{
color:#b8c0d4;
line-height:1.7;
}

.botoes{
display:flex;
gap:12px;
margin-top:25px;
flex-wrap:wrap;
}

.botao{
background:#1E5BFF;
padding:14px 24px;
border-radius:14px;
text-decoration:none;
color:white;
font-weight:bold;
}

.status{
margin-top:20px;
color:#8ba3ff;
font-size:15px;
}

@media(max-width:480px){

.logo{
height:45px;
}

.info h1{
font-size:28px;
}

.container{
padding:15px;
}

}

</style>

</head>

<body>

<header>

<a href="detalhes.html" class="voltar">
Voltar
</a>

<img src="logo.png" class="logo">

</header>

<div class="container">

<div class="player-box">

<video
id="video"
controls
playsinline
controlsList="nodownload"
>

<source src="video.mp4" type="video/mp4">

Seu navegador não suporta vídeo.

</video>

</div>

<div class="info">

<h1>Nome do Filme</h1>

<p>
Agora você está assistindo na VXLINK.
O sistema salva automaticamente o ponto do vídeo para que você possa continuar de onde parou.
</p>

<div class="status" id="status">
Preparando player...
</div>

<div class="botoes">

<a href="detalhes.html" class="botao">
Voltar aos Detalhes
</a>

<a href="index.html" class="botao">
Página Inicial
</a>

</div>

</div>

</div>

<script>

const video = document.getElementById("video");
const statusTexto = document.getElementById("status");

const chave = "vxlink-video-posicao";

video.addEventListener("loadedmetadata", ()=>{

const salvo = localStorage.getItem(chave);

if(salvo){

video.currentTime = parseFloat(salvo);

statusTexto.innerHTML =
"Retomando de onde você parou.";

}else{

statusTexto.innerHTML =
"Novo vídeo iniciado.";

}

});

video.addEventListener("timeupdate", ()=>{

localStorage.setItem(
chave,
video.currentTime
);

});

video.addEventListener("ended", ()=>{

localStorage.removeItem(chave);

statusTexto.innerHTML =
"Vídeo concluído.";

});

window.addEventListener("beforeunload", ()=>{

localStorage.setItem(
chave,
video.currentTime
);

});

</script>

</body>
</html>
