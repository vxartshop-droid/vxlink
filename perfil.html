<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfil - VXLINK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#05070D;
color:white;
}

header{
position:sticky;
top:0;
background:rgba(5,7,13,.95);
backdrop-filter:blur(15px);
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
height:55px;
}

.voltar{
background:#1E5BFF;
color:white;
text-decoration:none;
padding:10px 18px;
border-radius:12px;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.perfil{
background:#091223;
border-radius:22px;
padding:30px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,.35);
}

.avatar{
width:110px;
height:110px;
margin:auto;
border-radius:50%;
background:linear-gradient(135deg,#2E67FF,#0A1222);
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:bold;
margin-bottom:20px;
}

.nome{
font-size:32px;
font-weight:bold;
margin-bottom:10px;
}

.plano{
color:#aeb6c7;
font-size:18px;
margin-bottom:8px;
}

.validade{
color:#7da2ff;
font-size:17px;
}

.titulo{
margin-top:35px;
margin-bottom:18px;
font-size:28px;
font-weight:bold;
}

.lista{
display:flex;
gap:15px;
overflow-x:auto;
padding-bottom:10px;
}

.lista::-webkit-scrollbar{
display:none;
}

.card{
min-width:145px;
height:220px;
border-radius:20px;
background:linear-gradient(180deg,#2E67FF,#0A1222);
display:flex;
align-items:flex-end;
justify-content:center;
padding:18px;
font-weight:bold;
box-shadow:0 8px 20px rgba(0,0,0,.35);
}

.menu{
margin-top:35px;
display:grid;
gap:15px;
}

.item{
background:#091223;
padding:18px;
border-radius:16px;
text-decoration:none;
color:white;
font-weight:bold;
text-align:center;
}

@media(max-width:480px){

.logo{
height:45px;
}

.nome{
font-size:28px;
}

}

</style>

</head>

<body>

<header>

<a href="index.html" class="voltar">
Voltar
</a>

<img src="logo.png" class="logo">

</header>

<div class="container">

<div class="perfil">

<div class="avatar">
U
</div>

<div class="nome">
Usuário Teste
</div>

<div class="plano">
Plano Premium
</div>

<div class="validade">
Expira em: 05/07/2026
</div>

</div>

<div class="titulo">
Continuar Assistindo
</div>

<div class="lista">

<div class="card">Filme 1</div>
<div class="card">Filme 2</div>
<div class="card">Filme 3</div>

</div>

<div class="titulo">
Favoritos
</div>

<div class="lista">

<div class="card">Favorito 1</div>
<div class="card">Favorito 2</div>
<div class="card">Favorito 3</div>

</div>

<div class="menu">

<a href="#" class="item">
Editar Perfil
</a>

<a href="#" class="item">
Alterar Senha
</a>

<a href="login.html" class="item">
Sair da Conta
</a>

</div>

</div>

</body>
</html>
