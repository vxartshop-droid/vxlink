<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VXLINK</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#05070D;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#fff;
}

.container{
    width:90%;
    max-width:380px;
    text-align:center;
}

.logo{
    width:140px;
    margin-bottom:25px;
}

h1{
    font-size:42px;
    margin-bottom:10px;
}

.subtitulo{
    color:#a5a5a5;
    margin-bottom:35px;
    font-size:17px;
}

input{
    width:100%;
    height:55px;
    background:#0d1320;
    border:none;
    border-radius:12px;
    padding:15px;
    color:white;
    font-size:16px;
    margin-bottom:15px;
}

input:focus{
    outline:none;
}

button{
    width:100%;
    height:55px;
    background:#1E5BFF;
    border:none;
    border-radius:12px;
    color:white;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.esqueci{
    margin-top:25px;
    color:#8b8b8b;
    font-size:15px;
}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>Bem-vindo!</h1>

<p class="subtitulo">
Acesse sua conta para continuar
</p>

<input type="text" placeholder="E-mail ou usuário">

<input type="password" placeholder="Senha">

<button>Entrar</button>

<p class="esqueci">
Esqueci minha senha
</p>

</div>

</body>
</html>
